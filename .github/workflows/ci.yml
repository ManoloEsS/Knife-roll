name: CI

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: cd knife-roll_backend && npm ci
      - run: cd knife-roll_backend && npm run lint

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: cd knife-roll_frontend && npm ci
      - run: cd knife-roll_frontend && npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: cd knife-roll_backend && npm ci
      - run: cd knife-roll_backend && npx prisma generate
      - run: cd knife-roll_backend && npx tsc --noEmit
